<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro - MisTareas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="../static/css/main.css" th:href="@{/css/main.css}" rel="stylesheet" />
    <style>
        main {
          margin-top: 25px;
        }
    </style>
</head>
<body class="d-flex flex-column h-100">

<nav class="navbar navbar-expand navbar-dark navbar-custom" aria-label="Navegación principal">
    <div class="container-fluid">
        <h1 class="d-flex align-items-center fs-4 text-white mb-0">
            <img src="../static/img/logo.svg" th:src="@{/img/logo.svg}"
                 width="38" height="30" class="me-3" alt="Logo MisTareas">
            MisTareas
        </h1>
    </div>
</nav>
<main class="flex-shrink-0">
    <h1 class="text-center" style="margin-top: 20px;">Crear nueva cuenta</h1>
    <div class="container">
        <div class="row">
            <div class="col">
                <form action="#" th:action="@{/auth/register/submit}" method="post" th:object="${user}">
                    <div class="mb-3">
                        <label for="inputFullname" class="form-label">Nombre completo</label>
                        <input type="text" class="form-control" id="inputFullname" th:field="*{fullname}">
                    </div>
                    <div class="mb-3">
                        <label for="inputUsername" class="form-label">Nombre de usuario</label>
                        <input type="text" class="form-control" id="inputUsername" th:field="*{username}">
                    </div>
                    <div class="mb-3">
                        <label for="inputEmail" class="form-label">Correo electrónico</label>
                        <input type="email" class="form-control" id="inputEmail" th:field="*{email}">
                    </div>
                    <div class="mb-3">
                        <label for="inputPassword1" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="inputPassword1" th:field="*{password}">
                    </div>
                    <div class="mb-3">
                        <label for="inputPassword2" class="form-label">Repetir contraseña</label>
                        <input type="password" class="form-control" id="inputPassword2" th:field="*{verifyPassword}">
                    </div>
                    <button type="submit" class="btn btn-primary">Registrarse</button>
                </form>

            </div>
        </div>
    </div>

</main>
<footer class="footer footer-custom mt-auto py-3 fixed-bottom">
    <div class="container">
        <input class="form-check-input" type="checkbox" value="" id="flexCheckCheckedDisabled" checked disabled>
        <span>MisTareas - Proyecto DAW 2º - 2026</span>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
