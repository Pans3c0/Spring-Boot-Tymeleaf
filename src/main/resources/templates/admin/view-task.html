<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - Ver Tarea</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="../static/css/main.css" th:href="@{/css/main.css}" rel="stylesheet" />
</head>
<body class="d-flex flex-column h-100">
<nav class="navbar navbar-expand navbar-dark navbar-custom" aria-label="Navegación admin">
    <div class="container-fluid">
        <h1 class="d-flex align-items-center fs-4 text-white mb-0">
            <img src="../../static/img/logo.svg" th:src="@{/img/logo.svg}"
                 width="38" height="30" class="me-3" alt="Logo MisTareas">
            MisTareas
        </h1>
        <div class="collapse navbar-collapse navbar-options">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#" th:href="@{/admin/}">Inicio</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ROLE_ADMIN')">
                    <a class="nav-link" href="#" th:href="@{/admin/user}">Usuarios</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ROLE_ADMIN')">
                    <a class="nav-link" href="#" th:href="@{/admin/category}">Categorías</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ROLE_ADMIN')">
                    <a class="nav-link" href="#" th:href="@{/admin/task}">Tareas</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ROLE_ADMIN')">
                    <a class="nav-link" href="#" th:href="@{/task}">Mis Tareas</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <th-block th:with="auth=${#authentication.getPrincipal()}">
                        <a class="nav-link dropdown-toggle" href="#" id="dropdown03" data-bs-toggle="dropdown" aria-expanded="false" th:text="${auth.fullname ?: 'Usuario'}">Usuario</a>
                    </th-block>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="dropdown03">
                        <li>
                            <form style="display:none" th:action="@{/logout}" method="POST" id="logoutForm"></form>
                            <a class="dropdown-item" href="javascript:document.getElementById('logoutForm').submit()">Cerrar sesión</a>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>
<main>
    <div class="container py-5 h-100">
        <div class="row d-flex justify-content-center align-items-center h-100">
            <div class="col">
                <div class="card rounded-3">
                    <div class="card-body p-4">
                        <form class="row row-cols-lg-auto g-3 justify-content-center align-items-center mb-4 pb-2"
                              action="#" th:action="@{/task/edit/submit}" method="POST" th:object="${task}">
                            <h3>Detalle de la tarea</h3>
                            <input type="hidden" th:field="*{id}" />
                            <div class="col-12">
                                <div class="form-outline">
                                    <label class="form-label" for="task-title">Título</label>
                                    <div class="input-group">
                                        <input type="text" id="task-title" class="form-control"
                                               th:field="*{title}" readonly/>
                                    </div>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-outline">
                                    <label class="form-label" for="task-desc">Descripción</label>
                                    <textarea class="form-control" id="task-desc" rows="3" th:field="*{description}" readonly></textarea>
                                </div>
                            </div>
                            <div class="col-12">
                                <label for="category">Categoría</label>
                                <div class="input-group">
                                    <select id="category" th:field="*{categoryId}" class="form-select" disabled>
                                        <option value="-1">---</option>
                                        <option th:each="category : ${categories}"
                                                th:value="${category.id}" th:text="${category.title}">
                                            Categoría</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-12">
                                <label class="form-label" for="task-tags">Etiquetas</label>
                                <input type="text" id="task-tags" class="form-control" th:field="*{tags}" readonly/>
                            </div>
                            <div class="row">
                                <div class="col">
                                    <label class="form-label" for="task-owner">Autor</label>
                                    <input type="text" id="task-owner" class="form-control" th:field="*{username}" disabled="disabled" readonly="readonly" />
                                </div>
                                <div class="col">
                                    <label class="form-label" for="task-createdAt">Fecha de creación</label>
                                    <input type="text" id="task-createdAt" class="form-control" th:field="*{createdAt}" disabled="disabled" readonly="readonly"/>
                                </div>
                            </div>
                            <div class="col-12">
                                <input class="form-check-input" type="checkbox" value="" id="task-completed"
                                       th:field="*{completed}" disabled readonly>
                                <label class="form-check-label" for="task-completed">
                                    Completada
                                </label>
                            </div>

                            <div class="col-12">
                                <a href="#" th:href="@{/admin/}" class="btn btn-light float-end">Volver</a>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
</main>
<footer class="footer footer-custom mt-auto py-3 fixed-bottom">
    <div class="container">
        <input class="form-check-input" type="checkbox" value="" id="flexCheckCheckedDisabled" checked disabled>
        <span>MisTareas - Proyecto DAW 2º - 2026</span>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
