<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - Tareas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="../../static/css/main.css" th:href="@{/css/main.css}" rel="stylesheet" />
    <style>
        main { margin-top: 25px; }
        main div.container { max-width: 960px; }
    </style>
</head>
<body class="d-flex flex-column h-100">
<nav class="navbar navbar-expand navbar-dark navbar-custom" aria-label="Navegación admin">
    <div class="container-fluid">
        <h1 class="d-flex align-items-center fs-4 text-white mb-0">
            <img src="../../static/img/logo.svg" th:src="@{/img/logo.svg}"
                 width="38" height="30" class="me-3" alt="Logo MisTareas">
            MisTareas
        </h1>
        <div class="collapse navbar-collapse navbar-options">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#" th:href="@{/admin/}">Inicio</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ROLE_ADMIN')">
                    <a class="nav-link" href="#" th:href="@{/admin/user}">Usuarios</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ROLE_ADMIN')">
                    <a class="nav-link" href="#" th:href="@{/admin/category}">Categorías</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ROLE_ADMIN')">
                    <a class="nav-link active" href="#" aria-current="page"  th:href="@{/admin/task}">Tareas</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ROLE_ADMIN')">
                    <a class="nav-link" href="#" th:href="@{/task}">Mis Tareas</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <th-block th:with="auth=${#authentication.getPrincipal()}">
                        <a class="nav-link dropdown-toggle" href="#" id="dropdown03" data-bs-toggle="dropdown" aria-expanded="false" th:text="${auth.fullname ?: 'Usuario'}">Usuario</a>
                    </th-block>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="dropdown03">
                        <li>
                            <form style="display:none" th:action="@{/logout}" method="POST" id="logoutForm"></form>
                            <a class="dropdown-item" href="javascript:document.getElementById('logoutForm').submit()">Cerrar sesión</a>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>
<main class="flex-shrink-0">
    <div class="container">

        <div class="container" style="margin-top: 50px;" th:if="${param.emptyListError != null}">
            <img src="../static/img/empty-list.jpg" th:src="@{/img/empty-list.jpg}" width="100%"/>
        </div>

        <table class="table mb-4" th:if="${param.emptyListError == null}">
            <thead>
            <tr>
                <th scope="col">Id</th>
                <th scope="col">Autor</th>
                <th scope="col">Título</th>
                <th scope="col">Descripción</th>
                <th scope="col">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="task : ${taskList}" th:classappend="${task.completed} ? 'table-success'">
                <th scope="row" th:text="${task.id}">1</th>
                <td th:text="${task.author.fullname}">Autor</td>
                <td th:text="${task.title}">Tarea de ejemplo</td>
                <td th:text="${#strings.abbreviate(task.description,50)}">Descripción</td>
                <td>
                    <a href="#" th:href="@{/admin/task/{id}(id=${task.id})}" class="btn btn-primary btn-sm">Ver</a>
                    <a class="btn btn-danger btn-sm" th:onclick="|eliminarTarea(${task.id})|">Eliminar</a>
                    <form style="display:none" th:action="@{/admin/task/{id}/del(id=${task.id})}" method="post" th:id="${'delete-task-'+task.id}"></form>
                </td>
            </tr>
            </tbody>
        </table>

    </div>
</main>
<footer class="footer footer-custom mt-auto py-3 fixed-bottom">
    <div class="container">
        <input class="form-check-input" type="checkbox" value="" id="flexCheckCheckedDisabled" checked disabled>
        <span>MisTareas - Proyecto DAW 2º - 2026</span>
    </div>
</footer>
<script>
    function eliminarTarea(id) {
      if (confirm('¿Estás seguro de que quieres eliminar esta tarea?')) {
        document.getElementById('delete-task-'+id).submit();
      }
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
